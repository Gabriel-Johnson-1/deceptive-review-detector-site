<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deceptive Review Detector</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>Deceptive Review Detector</h1>

  <form id="reviewForm">
    <textarea name="review" placeholder="Paste review here..." required></textarea>
    
    <p><strong>What do you think this review is?</strong></p>

    <div>
      <label>
        <input type="radio" name="user_label" value="1" required> Fake
      </label>
      <label>
        <input type="radio" name="user_label" value="0"> Real
      </label>
    </div>

    <button type="submit">Submit</button>
  </form>

  <div id="result">
    <p id="predictionText"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
